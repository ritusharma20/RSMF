<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Donor Panel</title>
<style>
body { font-family: Arial, sans-serif; margin: 20px; background: #f9f9f9; }
h2 { color: #333; margin-bottom: 20px; }
table { border-collapse: collapse; width: 100%; background: #fff; }
th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
th { background: #f4b041; color: #fff; }
tr:nth-child(even) { background: #f9f9f9; }
a { color: #0066cc; text-decoration: none; }
a:hover { text-decoration: underline; }
</style>
</head>
<body>
<h2>Donor List</h2>
<table id="donorTable">
<thead>
<tr>
<th>SI.no</th>
<th>Name</th>
<th>Email</th>
<th>Phone</th>
<th>Address</th>
<th>Donation Amount (₹)</th>
<th>Message</th>
<th>Submitted At</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>
async function loadDonors() {
    try {
        const res = await fetch("http://localhost:5000/api/donor/admin"); // backend URL
        const data = await res.json();
        const tbody = document.querySelector("#donorTable tbody");
        tbody.innerHTML = "";

        data.forEach((donor, index) => {
            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td>${index + 1}</td>
                <td>${donor.name}</td>
                <td>${donor.email}</td>
                <td>${donor.phone || "-"}</td>
                <td>${donor.address || "-"}</td>
                <td>${donor.donationAmount || 0}</td>
                <td>${donor.message || "-"}</td>
                <td>${new Date(donor.createdAt).toLocaleString()}</td>
            `;
            tbody.appendChild(tr);
        });
    } catch (err) {
        console.error(err);
        alert("Failed to load donor submissions.");
    }
}

loadDonors();
</script>
</body>
</html>
