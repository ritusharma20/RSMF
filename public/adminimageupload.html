<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Gallery Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #eef2f7, #dfe9f3);
  margin: 0;
  padding: 20px;
}

h2 {
  text-align: center;
  color: #2f5d50;
  margin-bottom: 20px;
}

/* Upload Card */
.upload-card {
  max-width: 500px;
  margin: auto;
  background: #fff;
  padding: 25px;
  border-radius: 20px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.15);
  transition: 0.3s;
}

.upload-card:hover {
  transform: translateY(-5px);
}

.upload-card input, .upload-card button {
  width: 100%;
  padding: 12px;
  margin-top: 12px;
  border-radius: 10px;
  border: 1px solid #ddd;
  font-size: 14px;
}

.upload-card input:focus {
  outline: none;
  border-color: #e1a63b;
}

.upload-card button {
  background: linear-gradient(45deg, #ff9a3c, #ff6a00);
  border: none;
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

.upload-card button:hover {
  transform: scale(1.05);
}

.preview-img {
  width: 100%;
  margin-top: 10px;
  border-radius: 12px;
  display: none;
}

/* Gallery */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 25px;
  margin-top: 40px;
}

.card {
  background: #fff;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 10px 25px rgba(0,0,0,0.15);
  transition: 0.4s;
  position: relative;
}

.card:hover {
  transform: translateY(-8px) scale(1.02);
}

.card img {
  width: 100%;
  height: 160px;
  object-fit: cover;
  transition: 0.4s;
}

.card:hover img {
  transform: scale(1.1);
}

.card h5 {
  text-align: center;
  padding: 10px;
  margin: 0;
}

.actions {
  display: flex;
  justify-content: space-between;
  padding: 10px;
}

.actions button {
  flex: 1;
  margin: 3px;
  padding: 8px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
}

.delete-btn {
  background: #ff4d4d;
  color: white;
}

.delete-btn:hover {
  background: #e60000;
}

/* Floating effect */
.card::after {
  pointer-events: none;

  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(transparent, rgba(0,0,0,0.2));
  opacity: 0;
  transition: 0.3s;
}

.card:hover::after {
  opacity: 1;
}

</style>
</head>
<body>

<h2>✨ Admin Media Gallery</h2>

<div class="upload-card">
  <form id="uploadForm">
    <input type="text" name="title" placeholder="Enter Image Title" required>
    <input type="file" name="image" id="imageInput" accept="image/*" required>
    <img id="preview" class="preview-img" />
    <button type="submit">🚀 Upload Image</button>
  </form>
</div>

<div class="gallery" id="gallery"></div>

<script>
const form = document.getElementById('uploadForm');
const gallery = document.getElementById('gallery');
const preview = document.getElementById('preview');
const imageInput = document.getElementById('imageInput');

// Preview
imageInput.onchange = e => {
  const file = e.target.files[0];
  if(file){
    preview.src = URL.createObjectURL(file);
    preview.style.display = 'block';
  }
};

// Load Gallery
async function loadGallery() {
  const res = await fetch('http://localhost:5000/api/gallery/gallery');
  const data = await res.json();

  gallery.innerHTML = data.map(item => `
    <div class="card">
      <img src="http://localhost:5000/uploads/${item.filename}">
      <h5>${item.title}</h5>
      <div class="actions">
        <button class="delete-btn" onclick="deleteImage('${item._id}')">Delete</button>
      </div>
    </div>
  `).join('');
}

// Upload
form.addEventListener('submit', async (e) => {
  e.preventDefault();

  const formData = new FormData(form);

  const res = await fetch('http://localhost:5000/api/gallery/upload', {
    method: 'POST',
    body: formData
  });

  const data = await res.json();
  alert(data.message);

  form.reset();
  preview.style.display = 'none';
  loadGallery();
});

// Delete
async function deleteImage(id) {
  console.log("CLICK HO RAHA HAI", id);

  if(!confirm('Delete this image?')) return;

  await fetch(`http://localhost:5000/api/gallery/gallery/${id}`, {
    method: "DELETE"
  });

  loadGallery();
}
loadGallery();
</script>

</body>
</html>
