<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart City Patna Admin</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

<style>

body{
margin:0;
font-family:Segoe UI;
background:#f1f4f7;
}

/* TOPBAR */

.topbar{
height:60px;
background:white;
display:flex;
align-items:center;
padding:0 20px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.logo{
height:45px;
}

/* SIDEBAR */

.sidebar{
width:250px;
height:100vh;
background:#1e2b38;
position:fixed;
color:white;
}

.sidebar ul{
list-style:none;
padding:0;
margin:0;
}

.sidebar li{
padding:14px 20px;
cursor:pointer;
}

.sidebar li:hover{
background:#2d3a4a;
}

.sidebar a{
color:white;
text-decoration:none;
display:block;
}

.submenu{
display:none;
background:#2c3947;
}

.submenu li{
padding-left:40px;
font-size:14px;
}

/* PAGE AREA */

.page-wrapper{
margin-left:250px;
padding:30px;
}

.welcome{
font-size:22px;
color:#5a6a7a;
}

</style>

</head>

<body>

<!-- TOP HEADER -->

<div class="topbar">

<img src="assets/images/logo-new.png" class="logo">

</div>


<!-- SIDEBAR -->

<div class="sidebar">

<ul>

<ul class="submenu" id="submenu">

<li><a href="add-admin.html">Add Administrator</a></li>

<li>📊 View Tenders</li>

<li>📁 Projects</li>

<li>Board Directors</li>

</ul>

</div>


<!-- MAIN CONTENT -->

<div class="page-wrapper">

<h3 class="welcome">
Welcome to Smart City Of Patna
</h3>

</div>


<script>

function toggleMenu(){

var menu=document.getElementById("submenu");

if(menu.style.display==="block"){
menu.style.display="none";
}else{
menu.style.display="block";
}

}

</script>

</body>
</html>
