
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart City Patna Admin</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

    <style>
        body {
            margin: 0;
            font-family: Segoe UI;
            background: #eef1f5;
        }

        /* TOPBAR */

        .topbar {
            background: white;
            height: 65px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .logo {
            height: 45px;
        }

        .user {
            font-size: 14px;
            color: #777;
        }

        /* SIDEBAR */

        .sidebar {
            width: 250px;
            background: #1c2530;
            height: 100vh;
            position: fixed;
            color: white;
        }

        .sidebar ul {
            list-style: none;
            padding: 0;
        }

        .sidebar li {
            padding: 12px 20px;
        }

        .sidebar li:hover {
            background: #2d3a4a;
            cursor: pointer;
        }

        .sidebar a {
            color: white;
            text-decoration: none;
            display: block;
        }

        .submenu {
            display: none;
            background: #2c3947;
        }

        .submenu li {
            padding-left: 40px;
        }

        /* PAGE */

        .page-wrapper {
            margin-left: 250px;
            padding: 30px;
        }

        .card {
            border-radius: 8px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
        }

        .submit-btn {
            background: #1cc88a;
            border: none;
            padding: 10px 30px;
            color: white;
            border-radius: 4px;
        }
    </style>

</head>

<body>


    <!-- TOPBAR -->

    <div class="topbar">

        <img src="https://smartpatna.co.in/images/logo.png" class="logo">

        <div class="user">
            👤 user
        </div>

    </div>



    <!-- SIDEBAR -->

    <div class="sidebar">

        <ul>

            <li onclick="toggleMenu()">➕ Add Administrator</li>

            <ul class="submenu" id="submenu">

                <li>
                    <a href="add-admin.html">Add Administrator</a>
                </li>

                <li>
                    <a href="add-image-gallery.html">Add Image to Gallery</a>
                </li>

                <li>
                    <a href="video-gallery.html">Add Video to Gallery</a>
                </li>

                <li>
                    <a href="team-member.html">Add Team Member Details</a>
                </li>

                <li>
                    <a href="add-slider.html">Add Slider</a>
                </li>


            </ul>

            <li>👁 View and Update</li>
            <li>📄 Tenders</li>
            <li>📊 View Tenders</li>
            <li>📁 Projects</li>
            <li>Board Directors</li>

        </ul>

    </div>



    <!-- PAGE CONTENT -->

    <div class="page-wrapper">

        <div class="card p-4">

            <h4 class="mb-4">Add Administrator</h4>

            <form>

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label>First Name</label>
                        <input type="text" class="form-control" placeholder="First Name">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Last Name</label>
                        <input type="text" class="form-control" placeholder="Last Name">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>User Name</label>
                        <input type="text" class="form-control" placeholder="User Name">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Email ID</label>
                        <input type="email" class="form-control" placeholder="Email">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Password</label>
                        <input type="password" class="form-control" placeholder="Password">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Confirm Password</label>
                        <input type="password" class="form-control" placeholder="Confirm Password">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Mobile Number</label>
                        <input type="text" class="form-control" placeholder="Mobile Number">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Gender</label>

                        <select class="form-control">
                            <option>- Select Gender -</option>
                            <option>Male</option>
                            <option>Female</option>
                        </select>

                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Admin Picture</label>
                        <input type="file" class="form-control">
                    </div>

                </div>

                <div class="text-center mt-3">

                    <button class="submit-btn">
                        Add New Admin
                    </button>

                </div>

            </form>

        </div>

    </div>


    <script>

        function toggleMenu() {

            var menu = document.getElementById("submenu");

            if (menu.style.display === "block") {
                menu.style.display = "none";
            } else {
                menu.style.display = "block";
            }

        }

    </script>

</body>

</html>
