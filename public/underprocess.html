<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Under Process | Rita Shiva Memorial Foundation</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Outfit',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(to right,#b58016,#fff2a7,#b58016);
    overflow:hidden;
}

/* Main Card */
.process-wrapper{
    background:#ffffff;
    width:90%;
    max-width:600px;
    padding:60px 40px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 20px 50px rgba(0,0,0,0.2);
    position:relative;
    animation:fadeIn 1s ease-in-out;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(30px);}
    to{opacity:1; transform:translateY(0);}
}

/* Logo */
.logo{
    width:100px;
    margin-bottom:20px;
}

/* Loader Ring */
.loader{
    width:80px;
    height:80px;
    border:6px solid #f3f3f3;
    border-top:6px solid #b58016;
    border-radius:50%;
    margin:20px auto;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    100%{transform:rotate(360deg);}
}

h1{
    font-size:30px;
    color:#b58016;
    margin-bottom:10px;
}

p{
    font-size:16px;
    color:#555;
    margin-bottom:25px;
}

.status-badge{
    display:inline-block;
    padding:8px 20px;
    background:#fff2a7;
    color:#b58016;
    border-radius:25px;
    font-weight:600;
    margin-bottom:25px;
}

/* Button */
.btn-home{
    display:inline-block;
    padding:10px 25px;
    border-radius:30px;
    background:#b58016;
    color:#fff;
    text-decoration:none;
    font-weight:600;
    transition:0.3s;
}

.btn-home:hover{
    background:#a06f12;
    transform:scale(1.05);
}
</style>
</head>

<body>

<div class="process-wrapper">
    <img src="assets/images/logo.png" class="logo" alt="Foundation Logo">

    <h1>Page Under Process</h1>

    <div class="loader"></div>

    <span class="status-badge">We’re Working On It</span>

    <p>
        This page is currently under development.
        Our team at <strong>Rita Shiva Memorial Foundation</strong>
        is working hard to bring this section live soon.
        Thank you for your patience and support.
    </p>

    <a href="index.html" class="btn-home">Back to Home</a>
</div>

</body>
</html>
