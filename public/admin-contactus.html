<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Contact Panel</title>
<style>
body { font-family: Arial, sans-serif; margin: 20px; }
table { border-collapse: collapse; width: 100%; }
th, td { border: 1px solid #ddd; padding: 8px; }
th { background: #f4b041; color: #fff; }
a { color: #0066cc; text-decoration: none; }
a:hover { text-decoration: underline; }
</style>
</head>
<body>
<h2>All Contact Submissions</h2>
<table id="contactTable">
<thead>
<tr>
<th>Name</th>
<th>Email</th>
<th>Phone</th>
<th>Inquiry</th>
<th>Subject</th>
<th>Message</th>
<th>Attachment</th>
<th>Subscribed</th>
<th>Submitted At</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>
async function loadContacts() {
    try {
const res = await fetch("http://localhost:5000/api/contact/admin");        const data = await res.json();
        const tbody = document.querySelector("#contactTable tbody");
        tbody.innerHTML = "";

        data.forEach(contact => {
            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td>${contact.name}</td>
                <td>${contact.email}</td>
                <td>${contact.phone || "-"}</td>
                <td>${contact.inquiry || "-"}</td>
                <td>${contact.subject || "-"}</td>
                <td>${contact.message || "-"}</td>
<td>
  ${contact.attachment ? `<a href="/uploads/${contact.attachment}" target="_blank">Download</a>` : "-"}
</td>
<td>${contact.subscribe ? "Yes" : "No"}</td>
                <td>${new Date(contact.createdAt).toLocaleString()}</td>
            `;
            tbody.appendChild(tr);
        });
    } catch (err) {
        console.error(err);
        alert("Failed to load contact submissions.");
    }
}

loadContacts();
</script>
</body>
</html>
